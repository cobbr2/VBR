# Samba config for VBR container. Aligned with host_samba that worked on newsounds.
# path /music = host Music bind-mount; force user 1000 = rec on host.

[global]
   workgroup = WORKGROUP
   server string = %h server (Samba)
   server role = standalone server
   server min protocol = SMB2
   ea support = yes
   map to guest = bad user
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   load printers = no
   usershare allow guests = yes

# Mirror host_samba [music]: force user by id (rec=1000), vfs_fruit for macOS
[music]
   comment = Entire music library
   path = /music
   browsable = yes
   writable = yes
   guest ok = yes
   public = yes
   force user = 1000
   force create mode = 0664
   force directory mode = 0775
   create mask = 0664
   directory mask = 0775
   vfs objects = fruit streams_xattr
   fruit:metadata = stream
   fruit:delete_empty_adfiles = yes
   fruit:posix_rename = yes

[Music]
   comment = Entire music library (alias)
   path = /music
   browsable = yes
   writable = yes
   guest ok = yes
   public = yes
   force user = 1000
   force create mode = 0664
   force directory mode = 0775
   create mask = 0664
   directory mask = 0775
   vfs objects = fruit streams_xattr
   fruit:metadata = stream
   fruit:delete_empty_adfiles = yes
   fruit:posix_rename = yes

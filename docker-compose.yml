version: '3'
services:
  #
  # The LMS server that provides the familar UI on port 9000,
  # and the cli on port 9090.  3483 is the SlimProt and 1900
  # is the UPnP/Discovery mechanism.
  #
  # The first time this is accessed, it will need to be 
  # configured for the locations of the music and playlists.
  #
  lms:
    restart: unless-stopped
    image: justifiably/logitechmediaserver
    hostname: newsounds
    ports:
      - "9000:9000"
      - "9090:9090"
      - "3483:3483"
      - "3483:3483/udp"
      - "1900:1900"
    volumes:
      #
      # Use the music files stored in the users Music 
      # directory. Keep all the other related files in there 
      # too.  
      #
      # For later: should we mount only flac? Or rely on LMS config to only
      # use flac? How to handle crap we only have in MP3? IIRC, we already
      # can configure LMS to only pay attention to flac if there's a pair...
      # how does it decide on equivalence?
      #
      - ${MUSIC_ROOT:-/home/rec/Music}:/mnt/music:ro
      - ${MUSIC_ROOT:-/home/rec/Music}/playlists:/mnt/playlists
      - ${MUSIC_ROOT:-/home/rec/Music}/state:/mnt/state
      
      
  #
  # A media player on the local machine that LMS will find and
  # use for playback of the media files.  Could have multiple 
  # of these defined if there were multiple sound cards or 
  # DACs. Would need to give them different container and 
  # player names.
  #
  # Use aplay -l to find the audio OUTPUT_DEVICE.  Suspect the
  # format is card #, device #
  #
  # e.g.
  # card 0: PCH [HDA Intel PCH], device 0: VT2020 Analog [VT2020 Analog]
  # hw:0,0 is card 0, subdevice 0
  #
#  squeezelite:
#    restart: unless-stopped
#    image: aschamberger/squeezelite
#    hostname: media-player
#    environment:
#      - PLAYER=LocalSqueeze
#      - OUTPUT_DEVICE=hw:0,0
#    devices:
#      - "/dev/snd/:/dev/snd/"
  
  
  #
  # YAR - Yet Another Ripper
  #
  # The CD ripper that will monitor the CDROM drive for 
  # inserted audio disks.
  #
  # The ripper's /out directory is mapped to the same directory
  # that LMS looks in for media, i.e. ${MUSIC_ROOT:-/home/rec/Music}
  #
  # Note, need to give the ripper container access to the
  # CDROM device and then tell it what device to use.
  #
  # Ripper runs as root so it can read the CD device (/dev/sr0). abcde post_encode
  # chowns ripped files to USER_ID:GROUP_ID (1000:1000 = rec on host) so Samba
  # and Mac clients (e.g. Picard) can read/write/delete without a separate chown.
  #
  # The LMS_HOST (i.e the service name above) and LMS_PORT are 
  # used by the ripper to be able to contact LMS and tell it 
  # to rescan the contents of /mnt/music so that the newly 
  # ripped files are detected and indexed.  If the server 
  # cannot be found, it silently times out and LMS won't know 
  # about the new files unless the use through the UI initiates
  # a rescan.
  #
  ripper:
    restart: unless-stopped
    build:
        context: ./yar
    environment: 
      - CDROM=/dev/sr0
      - USER_ID=1000
      - GROUP_ID=1000
      - LMS_HOST=lms
      - LMS_CLI_PORT=9090
    volumes:
      - ${MUSIC_ROOT:-/home/rec/Music}:/out:rw
    devices:
      - "/dev/sr0:/dev/sr0"
      

  #
  # Mirror flac files to the specified formats.
  #
  # Periodically scans the /flac directory for flac
  # files that don't exist in the target format directories.
  #
  flac_mirror:
    restart: unless-stopped
    user: 1000:1000 # Should run as same user as ripper
    build:
        context: ./flac-mirror
    environment: 
      # 
      # A comma separated list of what formats to mirror to.  
      # NOTE: make sure that there is an appropriate volume mapped 
      # for the file type to somewhere outside the container otherwise the
      # mirrored files will be created inside the container where
      # no one will be able to see them!
      # 
      # Formats must be capitalized. Current possibilities are
      #   M4A
      #   MP3
      #   OGG
      #
      #- MIRROR=M4A
      - MIRROR=MP3
      #
      # ffmpeg mirroring options that can be over-ridden
      #
      # - M4A_OPTIONS=-c:a aac -b:a 192k -vn
      # - MP3_OPTIONS=-c:a mp3 -ab 192k -map_metadata 0
      # - OGG_OPTIONS=-c:a libvorbis
    volumes:
      - ${MUSIC_ROOT:-/home/rec/Music}/flac:/flac:ro
      - ${MUSIC_ROOT:-/home/rec/Music}/mp3:/mp3:rw
      - ${MUSIC_ROOT:-/home/rec/Music}/m4a:/m4a:rw
      - ${MUSIC_ROOT:-/home/rec/Music}/ogg:/ogg:rw
  #
  # Samba: Music share for Mac/Windows clients (e.g. Picard). Uses same
  # Music dir as LMS/ripper; force user 1000 so files are owned by rec on host.
  # Using mbentley/samba image (Docker-optimized) to test if it avoids tree-connect failure.
  #
  # It didn't.  See samba/README.md ; 3 hours of work w/ Cursor did not get a running
  # version.
  #
  # samba:
  #   restart: unless-stopped
  #   image: mbentley/samba:latest
  #   ports:
  #     - "139:139"
  #     - "445:445"
  #     - "137:137/udp"
  #     - "138:138/udp"
  #   environment:
  #     # Match host: guest account is default nobody; add to passdb so tree connect finds session user
  #     - ACCOUNT_nobody=65534:guest
  #   volumes:
  #     - ./samba/smb.conf:/etc/samba/smb.conf:ro
  #     - ${MUSIC_ROOT:-/home/rec/Music}:/music:rw
  #   tmpfs:
  #     - /run/samba
  #   hostname: newsounds

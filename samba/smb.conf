# Samba config for VBR container. Music share at /music (bind-mounted from host).
# No interfaces/bind so the container listens on all; force user 1000 = host's rec.

[global]
   workgroup = WORKGROUP
   server string = VBR Samba
   server role = standalone server
   server min protocol = SMB2
   ea support = yes
   map to guest = bad user
   guest account = GUEST
   host msdfs = no
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file

# Same vfs on all shares so macOS doesn't warn "some use vfs_fruit, others don't"
[printers]
   comment = All Printers
   browseable = no
   path = /var/spool/samba
   printable = yes
   guest ok = no
   read only = yes
   create mask = 0700
   vfs objects = fruit streams_xattr

[print$]
   comment = Printer Drivers
   path = /var/lib/samba/printers
   browseable = yes
   read only = yes
   guest ok = no
   vfs objects = fruit streams_xattr

# Music: host Music bind-mounted at /music. force user 1000 = rec on host.
# [Music] alias in case macOS or client requests capital M.
# TEMP: vfs_fruit removed to test if it breaks tree connect; add back if this fixes "share does not exist"
[music]
   comment = Entire music library
   path = /music
   browsable = yes
   writable = yes
   guest ok = yes
   public = yes
   force user = 1000
   force create mode = 0664
   force directory mode = 0775
   create mask = 0664
   directory mask = 0775

[Music]
   comment = Entire music library (alias)
   path = /music
   browsable = yes
   writable = yes
   guest ok = yes
   public = yes
   force user = 1000
   force create mode = 0664
   force directory mode = 0775
   create mask = 0664
   directory mask = 0775
